name: claude_remote
description: Drive your host's Claude Code from your phone — Flutter client.
publish_to: "none"
version: 1.3.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State + persistence
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  collection: ^1.18.0

  # Networking
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # Platform features (native modules — rebuild the app after changing these)
  flutter_local_notifications: ^17.2.3
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  open_filex: ^4.5.0

  # Rendering
  flutter_markdown: ^0.7.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
